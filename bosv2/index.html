<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BOSv2 — Buku Operasional Satuan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2333;
      --border: rgba(255,255,255,0.07);
      --accent: #f97316;
      --accent2: #fb923c;
      --accent-glow: rgba(249,115,22,0.18);
      --text: #f1f3f9;
      --text-muted: #8892a4;
      --text-dim: #4b5568;
      --green: #22c55e;
      --blue: #60a5fa;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 20px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -30px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(96,165,250,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      color: var(--accent2);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      position: relative;
    }
    .header h1 span { color: var(--accent); }
    .header-sub {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 6px;
      font-weight: 500;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 16px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-icon {
      width: 32px; height: 32px;
      background: var(--accent-glow);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }
    .card-body { padding: 20px; }

    /* ── FORM FIELDS ── */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    select, input, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    select option { background: #1e2333; }

    /* Custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 14px;
    }

    /* ── ROW GRID ── */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }

    /* ── READONLY / GENERATED FIELDS ── */
    .field-generated input, .field-generated textarea {
      background: var(--bg);
      border-color: rgba(34,197,94,0.2);
      color: var(--green);
      cursor: pointer;
      position: relative;
    }
    .field-generated textarea {
      min-height: 160px;
      resize: none;
      line-height: 1.6;
      font-size: 14px;
    }
    .copy-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
    }
    .copy-hint svg { flex-shrink: 0; }

    /* ── GENERATED INFO GRID ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .info-item {
      background: var(--bg);
      border: 1.5px solid rgba(34,197,94,0.15);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .info-item:hover {
      border-color: rgba(34,197,94,0.4);
      background: rgba(34,197,94,0.05);
    }
    .info-item:active { transform: scale(0.98); }
    .info-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
    }
    .info-item .copied-tag {
      position: absolute;
      top: 6px; right: 8px;
      font-size: 9px;
      font-weight: 700;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .info-item.copied .copied-tag { opacity: 1; }

    /* ── URAIAN ── */
    .uraian-box {
      background: var(--bg);
      border: 1.5px solid rgba(34,197,94,0.2);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .uraian-box:hover { border-color: rgba(34,197,94,0.4); }
    .uraian-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .uraian-copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.2);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      width: fit-content;
      transition: background 0.2s;
    }
    .uraian-copy-btn:hover { background: rgba(249,115,22,0.2); }

    /* ── MAIN BUTTON ── */
    .btn-generate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 4px 24px rgba(249,115,22,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-generate:hover {
      box-shadow: 0 6px 32px rgba(249,115,22,0.5);
    }
    .btn-generate:active {
      transform: scale(0.97);
      box-shadow: 0 2px 12px rgba(249,115,22,0.3);
    }
    .btn-icon {
      width: 24px; height: 24px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 30px;
      z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(34,197,94,0.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 32px 20px 0;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── MOBILE TWEAKS ── */
    @media (max-width: 400px) {
      .header h1 { font-size: 30px; }
      .row3 { grid-template-columns: 1fr 1fr; }
      .row3 .field:first-child { grid-column: 1 / -1; }
    }
  </style>
</head>

    </div>

    <!-- CARD: URAIAN -->

    </button>

    <div class="footer">BOSv2 · Kecamatan Plumpang</div>

  </div>

  <!-- TOAST -->
  <div id="toast">✓ Disalin ke clipboard</div>

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function generateRandom(min, max) {
  let rand = Math.floor(Math.random() * (max - min)) + min;
  return rand > 9 ? "" + rand : "0" + rand;
}
function toProperCase(val) {
  return val.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
const tanggalInput = document.getElementById('tanggal');
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, '0');
const dd = String(today.getDate()).padStart(2, '0');
tanggalInput.value = `${yyyy}-${mm}-${dd}`;

document.getElementById('desa').addEventListener('change', ganti);
document.getElementById('tanggal').addEventListener('change', ganti);

let currentUraian = '';

function ganti() {
  const random_nama   = nama[Math.floor(Math.random() * nama.length)];
  const random_kata   = kata[Math.floor(Math.random() * kata.length)].toLowerCase();
  const desa_val      = document.getElementById('desa').value;
  const desa_arr      = desa[desa_val];
  const desa_rand     = desa_arr[Math.floor(Math.random() * desa_arr.length)];
  const dusun         = desa_rand[0];
  const rw            = desa_rand[1];
  const rt            = desa_rand[2];
  const pukul         = generateRandom(8, 16) + "." + generateRandom(0, 59);

  const tanggalVal    = document.getElementById('tanggal').value;
  const d             = new Date(tanggalVal + 'T00:00:00');
  const hari          = seminggu[d.getDay()];
  const tgl_indo      = d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });

  const uraian = `Pada hari ${hari} (${tgl_indo}) Pukul ${pukul} WIB saya bertemu dengan Bpk. ${toProperCase(random_nama)} di Ds. ${toProperCase(desa_val)} Kec. Plumpang.\n\nBpk. ${toProperCase(random_nama)} ${random_kata}`;

  currentUraian = uraian;

  document.getElementById('nama').value = random_nama;
  document.getElementById('hari').value = hari;
  document.getElementById('pukul').value = pukul + " WIB";
  document.getElementById('dusun').value = dusun;
  document.getElementById('rt').value = rt;
  document.getElementById('rw').value = rw;
  document.getElementById('uraian-text').textContent = uraian;

  // Animate button
  const btn = document.getElementById('btn-ganti');
  btn.style.transform = 'scale(0.95)';
  setTimeout(() => btn.style.transform = '', 150);
}

// ═══════════════════════════════════════
// COPY FUNCTIONS
// ═══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + (msg || 'Disalin ke clipboard');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyField(el) {
  navigator.clipboard.writeText(el.value).then(() => showToast(el.value));
}

function copyUraian() {
  navigator.clipboard.writeText(currentUraian).then(() => showToast('Uraian disalin!'));
}
